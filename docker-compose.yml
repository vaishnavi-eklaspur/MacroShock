# MacroShock full stack: Redis + Flask API + Streamlit dashboard.
# Run:  docker-compose up --build
# Dashboard: http://localhost:8501   API: http://localhost:5050   React: http://localhost:5173

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    environment:
      REDIS_URL: redis://redis:6379/0
      MACROSHOCK_DB: /app/dbdata/macroshock.db
      # Data source seeded at container start: synthetic (default) | yahoo | csv.
      MACROSHOCK_SOURCE: ${MACROSHOCK_SOURCE:-synthetic}
      MACROSHOCK_START: ${MACROSHOCK_START:-2012-01-01}
      # Uncomment to require an API key on write endpoints:
      # MACROSHOCK_API_KEY: ${MACROSHOCK_API_KEY:-}
    ports:
      - "5050:5000"                    # host 5050 -> container 5000 (5000 clashes with macOS AirPlay / .NET)
    volumes:
      - macroshock-data:/app/dbdata    # DB-only volume (NOT over /app/data code) — survives restarts
    depends_on:
      redis:
        condition: service_healthy

  dashboard:
    build: ./frontend
    environment:
      API_BASE: http://api:5000
    ports:
      - "8501:8501"
    depends_on:
      - api

  # Optional React/TypeScript client (served by nginx). The browser calls the API on
  # localhost:5050, so the API's CORS must allow http://localhost:5173 (it does by default).
  react:
    build:
      context: ./frontend-react
      args:
        VITE_API_BASE: http://localhost:5050
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  macroshock-data:
