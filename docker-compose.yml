# MacroShock full stack: Redis + Flask API + Streamlit dashboard.
# Run:  docker-compose up --build
# Dashboard: http://localhost:8501   API: http://localhost:5000

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    environment:
      REDIS_URL: redis://redis:6379/0
      MACROSHOCK_DB: /app/data/macroshock.db
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy

  dashboard:
    build: ./frontend
    environment:
      API_BASE: http://api:5000
    ports:
      - "8501:8501"
    depends_on:
      - api
