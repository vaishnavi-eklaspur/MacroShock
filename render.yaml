# Render Blueprint — one-click free deploy of the API + dashboard from this repo.
# Deploy: push to GitHub, then on render.com -> New -> Blueprint -> pick this repo.
# (Redis is omitted; the cache degrades gracefully. Free instances sleep when idle.)
services:
  - type: web
    name: macroshock-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: free
    envVars:
      - key: MACROSHOCK_DB
        value: /app/dbdata/macroshock.db
      # Boot on REAL market data baked into the repo (a Yahoo snapshot), because Yahoo blocks
      # datacenter IPs so a live pull fails from any cloud host. CSV works everywhere.
      - key: MACROSHOCK_SOURCE
        value: csv
      - key: MACROSHOCK_CSV
        value: data/real_asset_returns.csv
      - key: MACROSHOCK_FACTORS_CSV
        value: data/real_factor_returns.csv
      - key: CORS_ORIGINS
        value: "*"
      # REQUIRED secret — set the value in the Render dashboard (not committed). Gates
      # portfolio persistence (write/delete); without it those endpoints are disabled.
      - key: MACROSHOCK_API_KEY
        sync: false

  - type: web
    name: macroshock-dashboard
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: API_BASE
        # If Render appends a suffix to the API's URL, update this in the dashboard's
        # Environment settings after the first deploy.
        value: https://macroshock-api.onrender.com
      # Same key as the API, so the dashboard can authenticate its save/load calls.
      - key: MACROSHOCK_API_KEY
        sync: false
